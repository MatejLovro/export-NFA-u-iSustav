; ============================================================
; param.ini - konfiguracijska datoteka za aplikaciju uvoza racuna
; Komentari pocinju znakom ; ili #
; ============================================================

[fiksne_vrijednosti]
idposjed=1
idsklad=1
sisuser=5
idfirme=1
idrobacjenik=1
idrobagrupe=8
idrobafilter=3
idrabgrupe=1

; ID-jevi jedinica mjere u FB:MJERE tablici
idmjerekom=2
idmjeresat=5
idmjerem=4
idmjerekm=6

; sifre poreza - kako se DBF sifra poreza mapira na Firebird sifru poreza (FB:POREZ:SIFPOR)
dbfpdv25=25
dbfpdv0=00
fbpdv25=P25
fbpdv0=NEO

; folder gdje se nalazi prva grupa .DBF datoteka (RACUNI.DBF, SUR.DBF, EIU_1.DBF)
dir_rac=C:\DBF\NFA

; folder gdje se nalazi druga grupa .DBF datoteka (PARTNERI.DBF, ARTIKLI.DBF, USLUGE.DBF)
dir_baze=C:\DBF\BAZE

; folder gdje se nalazi .FDB datoteka
dir_fdb=D:\iSustavMW\Podaci\

; naziv .FDB datoteke
fdb_file=MICROWORLD-TEST-2026IS.FDB

; kodna stranica DBF datoteka
dbf_encoding=cp852

[firebird]
host=localhost
port=3050
user=SYSDBA
password=masterkey

[import]
; broj zapisa koji se sakupljaju prije commita (za buduci batch insert, ako zatreba)
batch_size=500
